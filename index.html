<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // in sandboxed/iframe preview environments before any of Vite's modules are loaded.
      (function() {
        try {
          var win = window || {};
          var originalFetch = win.fetch;
          var currentFetch = originalFetch;

          // Define setter and getter directly on the window instance or its prototype
          Object.defineProperty(win, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });

          if (typeof globalThis !== 'undefined' && globalThis !== win) {
            Object.defineProperty(globalThis, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Sandbox fetch setter polyfill warning:', e);
        }
      })();
    </script>
    <!-- Google Identity Services (GIS) Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
