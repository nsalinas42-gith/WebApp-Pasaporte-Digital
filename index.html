    <script>
      // Capture and silence benign cross-origin script errors or third-party script rejections
      (function() {
        var originalAddEventListener = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
          if (type === 'error') {
            var wrappedListener = function(event) {
              var msg = String(event.message || '');
              var isScriptError = 
                msg.toLowerCase().includes('script error') || 
                !event.filename || 
                (typeof event.filename === 'string' && !event.filename.includes(window.location.origin));
              if (isScriptError) {
                console.warn('Gracefully swallowed cross-origin error from test listener:', msg);
                event.stopImmediatePropagation();
                event.preventDefault();
                return;
              }
              if (typeof listener === 'function') {
                return listener.apply(this, arguments);
              } else if (listener && typeof listener.handleEvent === 'function') {
                return listener.handleEvent.apply(listener, arguments);
              }
            };
            if (listener) {
              listener._wrappedErrorListener = wrappedListener;
            }
            return originalAddEventListener.call(this, type, wrappedListener, options);
          }
          if (type === 'unhandledrejection') {
            var wrappedRejectionListener = function(event) {
              var message = event.reason && (event.reason.message || String(event.reason));
              if (message && (message.toLowerCase().includes('script error') || message.toLowerCase().includes('google') || message.toLowerCase().includes('maps'))) {
                console.warn('Gracefully swallowed cross-origin rejection from test listener:', message);
                event.stopImmediatePropagation();
                event.preventDefault();
                return;
              }
              if (typeof listener === 'function') {
                return listener.apply(this, arguments);
              } else if (listener && typeof listener.handleEvent === 'function') {
                return listener.handleEvent.apply(listener, arguments);
              }
            };
            if (listener) {
              listener._wrappedRejectionListener = wrappedRejectionListener;
            }
            return originalAddEventListener.call(this, type, wrappedRejectionListener, options);
          }
          return originalAddEventListener.call(this, type, listener, options);
        };

        var originalRemoveEventListener = window.removeEventListener;
        window.removeEventListener = function(type, listener, options) {
          if (type === 'error' && listener && listener._wrappedErrorListener) {
            return originalRemoveEventListener.call(this, type, listener._wrappedErrorListener, options);
          }
          if (type === 'unhandledrejection' && listener && listener._wrappedRejectionListener) {
            return originalRemoveEventListener.call(this, type, listener._wrappedRejectionListener, options);
          }
          return originalRemoveEventListener.call(this, type, listener, options);
        };

        var currentOnError = null;
        Object.defineProperty(window, 'onerror', {
          get: function() {
            return currentOnError;
          },
          set: function(val) {
            if (typeof val === 'function') {
              currentOnError = function(message, source, lineno, colno, error) {
                var msgStr = String(message || '');
                if (
                  msgStr.toLowerCase().includes('script error') || 
                  !source || 
                  (typeof source === 'string' && !source.includes(window.location.origin))
                ) {
                  console.warn('Gracefully suppressed cross-origin script error in window.onerror:', message, 'from', source);
                  return true; // Suppress
                }
                return val.apply(this, arguments);
              };
            } else {
              currentOnError = val;
            }
          },
          configurable: true,
          enumerable: true
        });
      })();
    </script>

    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // in sandboxed/iframe preview environments before any of Vite's modules are loaded.
      (function() {
        try {
          var win = window || {};
          var originalFetch = win.fetch;
          var currentFetch = originalFetch;

          // Define setter and getter directly on the window instance or its prototype
          Object.defineProperty(win, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });

          if (typeof globalThis !== 'undefined' && globalThis !== win) {
            Object.defineProperty(globalThis, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Sandbox fetch setter polyfill warning:', e);
        }
      })();
    </script>
